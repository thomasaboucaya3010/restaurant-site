<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מסעדאטא</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #F7F3EC; --burnt: #C4622D; --burnt2: #D97440;
      --ink: #1A1A16; --ink2: #4A4A42; --ink3: #8A8A80;
      --white: #FDFAF4; --border: rgba(59,74,45,0.13); --olive: #3B4A2D;
    }
    body { font-family: 'Heebo', sans-serif; background: var(--cream); color: var(--ink); direction: rtl; min-height: 100vh; }
    nav { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 2.5rem; height: 58px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.5rem; font-weight: 900; color: var(--ink); letter-spacing: -1px; }
    .logo span { color: var(--burnt); }
    .admin-badge { font-size: 0.75rem; font-weight: 700; background: var(--olive); color: white; padding: 3px 10px; border-radius: 20px; display: none; }
    .admin-badge.show { display: block; }
    .hero { padding: 4rem 2rem 1rem; text-align: center; max-width: 620px; margin: 0 auto; }
    .hero-title { font-size: clamp(3rem, 7vw, 5rem); font-weight: 900; color: var(--ink); letter-spacing: -3px; line-height: 1; margin-bottom: 0.6rem; }
    .hero-title span { color: var(--burnt); }
    .hero-slogan { font-size: 0.95rem; font-weight: 300; color: var(--ink3); margin-bottom: 3rem; }
    .hero-slogan em { font-style: normal; font-weight: 700; color: var(--burnt); }
    .main-card { background: var(--white); border-radius: 20px; border: 1px solid var(--border); padding: 2.2rem; max-width: 580px; margin: 0 auto 1.6rem; }
    .main-q { font-size: 1.15rem; font-weight: 700; color: var(--ink); margin-bottom: 1.4rem; }
    .option-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.8rem; }
    .opt { border: 1.5px solid var(--border); border-radius: 14px; padding: 1.1rem 1.4rem; cursor: pointer; background: var(--cream); transition: all 0.15s; display: flex; flex-direction: column; gap: 3px; }
    .opt:hover { border-color: var(--burnt2); }
    .opt.sel { border-color: var(--burnt); background: var(--white); }
    .opt-title { font-size: 0.95rem; font-weight: 700; color: var(--ink); }
    .opt-hint { font-size: 0.8rem; font-weight: 300; color: var(--ink3); }
    .free-input-wrap { display: none; margin-bottom: 1.4rem; }
    .free-input-wrap.show { display: block; }
    .inp { width: 100%; padding: 11px 15px; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Heebo', sans-serif; font-size: 0.95rem; background: var(--cream); color: var(--ink); direction: rtl; outline: none; transition: border-color 0.15s; resize: none; }
    .inp:focus { border-color: var(--burnt); }
    .inp::placeholder { color: var(--ink3); }
    select.inp { cursor: pointer; }
    .btn-main { width: 100%; padding: 13px; border-radius: 12px; border: none; background: var(--burnt); font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 700; color: white; cursor: pointer; transition: background 0.15s; }
    .btn-main:hover { background: var(--burnt2); }
    .btn-main:disabled { background: var(--border); color: var(--ink3); cursor: not-allowed; }
    .sep { display: flex; align-items: center; gap: 1rem; max-width: 580px; margin: 0 auto 1.4rem; color: var(--ink3); font-size: 0.82rem; font-weight: 300; }
    .sep::before, .sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-filter { display: block; width: 100%; max-width: 580px; margin: 0 auto 3rem; padding: 12px; border-radius: 12px; border: 1.5px solid var(--border); background: transparent; font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 500; color: var(--ink2); cursor: pointer; transition: all 0.15s; text-align: center; }
    .btn-filter:hover { border-color: var(--olive); color: var(--olive); }
    .wizard-wrap { background: var(--white); border-radius: 20px; border: 1px solid var(--border); padding: 2.2rem; max-width: 580px; margin: 0 auto 3rem; }
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 1.8rem; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--burnt); border-radius: 2px; transition: width 0.3s ease; }
    .step-label { font-size: 0.75rem; font-weight: 500; color: var(--ink3); margin-bottom: 0.5rem; letter-spacing: 0.5px; }
    .step-q { font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 0.4rem; }
    .step-hint { font-size: 0.8rem; font-weight: 300; color: var(--ink3); margin-bottom: 0.9rem; }
    .step-free { margin-bottom: 0.9rem; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 0.5rem; }
    .chip { padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border); font-family: 'Heebo', sans-serif; font-size: 0.83rem; font-weight: 500; color: var(--ink2); background: var(--cream); cursor: pointer; transition: all 0.15s; user-select: none; -webkit-user-select: none; }
    .chip:hover { border-color: var(--burnt2); color: var(--burnt); background: var(--white); }
    .chip.sel { border-color: var(--burnt) !important; background: var(--burnt) !important; color: white !important; }
    .btn-row { display: flex; gap: 10px; align-items: center; margin-top: 1.6rem; }
    .btn-back { padding: 10px 20px; border-radius: 12px; border: 1.5px solid var(--border); background: transparent; font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 500; color: var(--ink3); cursor: pointer; white-space: nowrap; }
    .btn-back:hover { color: var(--ink); border-color: var(--ink3); }
    .btn-next { padding: 11px 0; border-radius: 12px; border: none; background: var(--burnt); font-family: 'Heebo', sans-serif; font-size: 0.95rem; font-weight: 700; color: white; cursor: pointer; flex: 1; transition: background 0.15s; }
    .btn-next:hover { background: var(--burnt2); }
    .btn-next:disabled { background: var(--border); color: var(--ink3); cursor: not-allowed; }
    .skip-btn { font-size: 0.8rem; color: var(--ink3); background: none; border: none; cursor: pointer; font-family: 'Heebo', sans-serif; text-decoration: underline; padding: 0; margin-top: 10px; display: block; text-align: center; width: 100%; }
    .results-wrap { max-width: 580px; margin: 2rem auto 3rem; padding: 0 2rem; }
    .back-link { font-size: 0.82rem; font-weight: 500; color: var(--burnt); background: none; border: none; cursor: pointer; font-family: 'Heebo', sans-serif; margin-bottom: 1.2rem; display: block; text-align: right; }
    .result-card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); padding: 1.4rem; margin-bottom: 1rem; }
    .result-name { font-size: 1.2rem; font-weight: 900; color: var(--ink); letter-spacing: -0.5px; margin-bottom: 0.5rem; }
    .result-desc { font-size: 0.9rem; font-weight: 300; color: var(--ink2); line-height: 1.6; margin-bottom: 1rem; }
    .result-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .result-link { display: inline-flex; align-items: center; gap: 5px; font-size: 0.82rem; font-weight: 700; color: var(--burnt); text-decoration: none; border: 1.5px solid var(--burnt); border-radius: 8px; padding: 5px 12px; transition: all 0.15s; }
    .result-link:hover { background: var(--burnt); color: white; }
    .why-btn { font-size: 0.78rem; font-weight: 500; color: var(--ink3); background: none; border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; cursor: pointer; font-family: 'Heebo', sans-serif; transition: all 0.15s; display: none; }
    .why-btn.show { display: inline-flex; }
    .why-btn:hover { border-color: var(--olive); color: var(--olive); }
    .debug-panel { background: #f0f4e8; border: 1px solid rgba(59,74,45,0.2); border-radius: 10px; padding: 1rem; margin-top: 0.8rem; display: none; direction: rtl; }
    .debug-panel.show { display: block; }
    .debug-title { font-size: 0.75rem; font-weight: 700; color: var(--olive); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .debug-reason { font-size: 0.85rem; color: var(--ink2); margin-bottom: 0.8rem; line-height: 1.5; }
    .debug-fields { font-size: 0.78rem; color: var(--ink3); line-height: 1.8; }
    .debug-fields span { color: var(--ink2); font-weight: 500; }
    .edit-link { display: inline-flex; align-items: center; gap: 4px; font-size: 0.78rem; font-weight: 700; color: var(--olive); text-decoration: none; border: 1px solid var(--olive); border-radius: 6px; padding: 4px 10px; margin-top: 0.6rem; transition: all 0.15s; }
    .edit-link:hover { background: var(--olive); color: white; }
    .show-more-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid var(--border); background: transparent; font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 500; color: var(--ink2); cursor: pointer; transition: all 0.15s; margin-top: 0.5rem; display: none; }
    .show-more-btn.show { display: block; }
    .show-more-btn:hover { border-color: var(--olive); color: var(--olive); }
    .no-results { text-align: center; padding: 3rem 1rem; color: var(--ink3); }
    .no-results strong { display: block; font-size: 1.1rem; font-weight: 700; color: var(--ink2); margin-bottom: 0.5rem; }
    .loading { text-align: center; padding: 3rem; color: var(--ink3); font-size: 0.95rem; }
    .spinner { display: inline-block; width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--burnt); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .filters-wrap { background: var(--white); border-radius: 20px; border: 1px solid var(--border); padding: 2.2rem; max-width: 580px; margin: 0 auto 3rem; }
    .admin-login { position: fixed; bottom: 20px; left: 20px; font-size: 0.7rem; color: var(--border); cursor: pointer; user-select: none; }
    .admin-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; align-items: center; justify-content: center; }
    .admin-modal-bg.show { display: flex; }
    .admin-modal { background: var(--white); border-radius: 16px; padding: 2rem; width: 320px; text-align: center; }
    .admin-modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: var(--ink); }
    .admin-modal input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 0.95rem; margin-bottom: 1rem; outline: none; text-align: center; }
    .admin-modal input:focus { border-color: var(--olive); }
    .admin-modal-btn { width: 100%; padding: 11px; border-radius: 10px; border: none; background: var(--olive); font-family: 'Heebo', sans-serif; font-size: 0.95rem; font-weight: 700; color: white; cursor: pointer; }
    .admin-error { font-size: 0.82rem; color: var(--burnt); margin-top: 0.5rem; display: none; }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
    .results-title { font-size: 1.1rem; font-weight: 700; color: var(--ink); }
    .results-count { font-size: 0.8rem; color: var(--ink3); font-weight: 300; }
  </style>
</head>
<body>

<nav>
  <div class="logo">מסעדאטא<span>.</span></div>
  <div class="admin-badge" id="admin-badge">מצב עריכה</div>
</nav>

<!-- HOME -->
<div id="view-home">
  <div class="hero">
    <div class="hero-title">מסעדאטא<span>.</span></div>
    <div class="hero-slogan">האתר שממליץ על מסעדות <em>מומלצות</em> — מומלץ!</div>
  </div>
  <div class="main-card">
    <div class="main-q">מה את.ה מחפש.ת?</div>
    <div class="option-row">
      <div class="opt" id="opt-free" onclick="selectMode('free')">
        <div class="opt-title">תאר.י לנו במילים שלך</div>
        <div class="opt-hint">(למשל: מקום נחמד לארוחת ערב עם חברים, לא יקר מדי, בתל אביב)</div>
      </div>
      <div class="opt" id="opt-guided" onclick="selectMode('guided')">
        <div class="opt-title">שאלות מנחות</div>
        <div class="opt-hint">נשאל אותך.ך כמה שאלות קצרות ונמצא את המקום המושלם</div>
      </div>
    </div>
    <div class="free-input-wrap" id="free-input">
      <textarea class="inp" rows="3" placeholder="למשל: מקום רומנטי ושקט בפלורנטין לזוג, עם אפשרויות טבעוניות, תקציב בינוני..." oninput="checkFreeBtn()"></textarea>
    </div>
    <button class="btn-main" id="btn-main" disabled onclick="handleMain()">חפש.י</button>
  </div>
  <div class="sep">או</div>
  <button class="btn-filter" onclick="showView('view-filters')">חיפוש עצמאי עם פילטרים ←</button>
</div>

<!-- WIZARD -->
<div id="view-wizard" style="display:none">
  <div style="max-width:580px;margin:2rem auto 1rem;padding:0 2rem;display:flex;justify-content:flex-end">
    <button onclick="showView('view-home')" style="font-size:0.82rem;font-weight:500;color:var(--burnt);background:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif">← חזרה לדף הבית</button>
  </div>
  <div class="wizard-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div id="wizard-body"></div>
  </div>
</div>

<!-- RESULTS -->
<div id="view-results" style="display:none">
  <div class="results-wrap">
    <button class="back-link" onclick="showView('view-home')">← חיפוש חדש</button>
    <div id="results-body"><div class="loading"><span class="spinner"></span>מחפש.ת את המקום המושלם...</div></div>
    <button class="show-more-btn" id="show-more-btn" onclick="loadMore()">הצג עוד מסעדות ←</button>
  </div>
</div>

<!-- FILTERS -->
<div id="view-filters" style="display:none">
  <div style="max-width:580px;margin:2rem auto 1rem;padding:0 2rem;display:flex;justify-content:flex-end">
    <button onclick="showView('view-home')" style="font-size:0.82rem;font-weight:500;color:var(--burnt);background:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif">← חזרה</button>
  </div>
  <div class="filters-wrap">
    <div style="font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:1.4rem">חיפוש עם פילטרים</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:1.4rem">
      <select class="inp" id="f-city"><option value="">כל הערים / אזורים</option><option>תל אביב</option><option>ירושלים</option><option>חיפה</option><option>הגליל</option><option>הנגב</option></select>
      <select class="inp" id="f-price"><option value="">תקציב לאדם</option><option>עד 50 ₪</option><option>50–100 ₪</option><option>100–200 ₪</option><option>יקר אבל לא מוגזם</option><option>אין הגבלה</option></select>
      <select class="inp" id="f-vibe"><option value="">אווירה</option><option>אינטימי ושקט</option><option>קליל וכיפי</option><option>מכובד ורשמי</option><option>רועש וחי</option></select>
      <select class="inp" id="f-diet"><option value="">דיאטה</option><option>טבעוני</option><option>צמחוני</option><option>ללא גלוטן</option><option>כשר</option></select>
    </div>
    <button class="btn-main" onclick="searchWithFilters()">חפש.י</button>
  </div>
</div>

<!-- ADMIN LOGIN MODAL -->
<div class="admin-modal-bg" id="admin-modal">
  <div class="admin-modal">
    <h3>כניסת מנהל</h3>
    <input type="password" id="admin-pw" placeholder="סיסמה" onkeydown="if(event.key==='Enter')checkAdmin()">
    <button class="admin-modal-btn" onclick="checkAdmin()">כניסה</button>
    <div class="admin-error" id="admin-error">סיסמה שגויה</div>
    <div style="margin-top:1rem"><button onclick="closeAdminModal()" style="font-size:0.82rem;color:var(--ink3);background:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif">ביטול</button></div>
  </div>
</div>

<div class="admin-login" onclick="openAdminModal()">⚙</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTKvxSYmsFCDHcDtIl2DWhISC_IdOGwmPDcML1XzJhxjLT5V5yjl5PnGfq8p3wdxMSULOX5BPSa05Fk/pub?gid=0&single=true&output=csv';
const SHEET_EDIT_URL = 'https://docs.google.com/spreadsheets/d/1REPLACE_WITH_YOUR_SHEET_ID/edit';
const ADMIN_PASSWORD = 'misadata2024';

let restaurants = [];
let mode = null;
let cur = 0;
let ans = {};
let isAdmin = false;
let currentQuery = '';
let currentOffset = 0;
let currentHasMore = false;
let renderedCards = [];

async function loadRestaurants() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
    restaurants = lines.slice(1).filter(l => l.trim()).map((line, rowIdx) => {
      const vals = parseCSV(line);
      const obj = { _rowIndex: rowIdx + 2 };
      headers.forEach((h,i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,'').trim());
      return obj;
    });
    console.log('Loaded', restaurants.length, 'restaurants');
  } catch(e) {
    console.error('Could not load restaurants', e);
  }
}

function parseCSV(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') { inQ = !inQ; }
    else if (line[i] === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += line[i]; }
  }
  result.push(cur);
  return result;
}

// ADMIN
function openAdminModal() { document.getElementById('admin-modal').classList.add('show'); document.getElementById('admin-pw').focus(); }
function closeAdminModal() { document.getElementById('admin-modal').classList.remove('show'); document.getElementById('admin-pw').value = ''; document.getElementById('admin-error').style.display = 'none'; }
function checkAdmin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    closeAdminModal();
    document.getElementById('admin-badge').classList.add('show');
    document.querySelectorAll('.why-btn').forEach(b => b.classList.add('show'));
  } else {
    document.getElementById('admin-error').style.display = 'block';
  }
}

function toggleDebug(idx) {
  const panel = document.getElementById('debug-' + idx);
  if (panel) panel.classList.toggle('show');
}

function selectMode(m) {
  mode = m;
  document.getElementById('opt-free').classList.toggle('sel', m === 'free');
  document.getElementById('opt-guided').classList.toggle('sel', m === 'guided');
  document.getElementById('free-input').classList.toggle('show', m === 'free');
  const btn = document.getElementById('btn-main');
  if (m === 'guided') { btn.disabled = false; btn.textContent = 'התחל.י בשאלות ←'; }
  else { btn.textContent = 'חפש.י'; checkFreeBtn(); }
}

function checkFreeBtn() {
  if (mode !== 'free') return;
  document.getElementById('btn-main').disabled = document.querySelector('#free-input textarea').value.trim().length < 3;
}

function handleMain() {
  if (mode === 'guided') { ans = {}; cur = 0; showView('view-wizard'); renderStep(); }
  else {
    currentQuery = document.querySelector('#free-input textarea').value;
    currentOffset = 0;
    renderedCards = [];
    showView('view-results');
    doSearch();
  }
}

function showView(id) {
  ['view-home','view-wizard','view-results','view-filters'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
  if (id === 'view-results') {
    document.getElementById('results-body').innerHTML = '<div class="loading"><span class="spinner"></span>מחפש.ת את המקום המושלם...</div>';
    document.getElementById('show-more-btn').classList.remove('show');
  }
  if (id === 'view-home') {
    mode = null; ans = {}; cur = 0; currentOffset = 0; renderedCards = [];
    document.getElementById('opt-free').classList.remove('sel');
    document.getElementById('opt-guided').classList.remove('sel');
    document.getElementById('free-input').classList.remove('show');
    const btn = document.getElementById('btn-main');
    btn.disabled = true; btn.textContent = 'חפש.י';
  }
}

async function doSearch() {
  if (!restaurants.length) { renderResults([], false, 0); return; }
  try {
    const res = await fetch('/.netlify/functions/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: currentQuery, restaurants, offset: currentOffset, count: 3 })
    });
    const data = await res.json();
    currentHasMore = data.hasMore;
    renderResults(data.results || [], data.hasMore, data.totalFound, currentOffset === 0);
    currentOffset += (data.results || []).length;
  } catch(e) {
    console.error('Search failed', e);
    renderResults(restaurants.slice(0, 3).map(r => ({ restaurant: r, reason: 'התאמה כללית' })), false, 3, true);
  }
}

function loadMore() {
  document.getElementById('show-more-btn').classList.remove('show');
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'loading';
  loadingDiv.innerHTML = '<span class="spinner"></span>מחפש עוד...';
  loadingDiv.id = 'loading-more';
  document.getElementById('results-body').appendChild(loadingDiv);
  doSearch();
}

function searchWithFilters() {
  const city = document.getElementById('f-city').value;
  const price = document.getElementById('f-price').value;
  const vibe = document.getElementById('f-vibe').value;
  const diet = document.getElementById('f-diet').value;
  currentQuery = [city, price, vibe, diet].filter(Boolean).join(', ') || 'המלצה כללית';
  currentOffset = 0;
  renderedCards = [];
  showView('view-results');
  doSearch();
}

function renderResults(results, hasMore, totalFound, isFirstPage = true) {
  const loadingMore = document.getElementById('loading-more');
  if (loadingMore) loadingMore.remove();

  if (isFirstPage) {
    if (!results || !results.length) {
      document.getElementById('results-body').innerHTML = '<div class="no-results"><strong>לא מצאנו תוצאות</strong>נסה.י לחפש שוב עם פרטים שונים</div>';
      return;
    }
    const header = `<div class="results-header"><div class="results-title">המלצות בשבילך</div><div class="results-count">${totalFound} מסעדות עברו סינון</div></div>`;
    document.getElementById('results-body').innerHTML = header;
  }

  const startIdx = renderedCards.length;
  results.forEach((item, i) => {
    const idx = startIdx + i;
    const r = item.restaurant;
    const reason = item.reason || '';
    renderedCards.push(r);

    const editUrl = SHEET_EDIT_URL;
    const link = r.website ? `<a href="${r.website}" target="_blank" class="result-link">לאתר ↗</a>` : '';

    const debugFields = `
      <div class="debug-fields">
        עיר: <span>${r.location_city || '—'}</span> |
        שכונה: <span>${r.location_neighborhood || '—'}</span> |
        סגנון: <span>${r.style || '—'}</span><br>
        מחיר: <span>${r.price_range || '—'}</span> |
        אווירה: <span>${r.vibe || '—'}</span> |
        כשר: <span>${r.kosher || '—'}</span><br>
        דיאטה: <span>${r.diet || '—'}</span> |
        זמן: <span>${r.time_of_day || '—'}</span> |
        ימים: <span>${r.day || '—'}</span><br>
        מתאים ל: <span>${r.occasion || '—'}</span> |
        קבוצה: <span>${r.group_size || '—'}</span>
      </div>
      <a href="${editUrl}" target="_blank" class="edit-link">✏ ערוך בגיליון</a>`;

    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-name">${r.name}</div>
      <div class="result-desc">${r.my_tip || ''}</div>
      <div class="result-actions">
        ${link}
        <button class="why-btn ${isAdmin ? 'show' : ''}" onclick="toggleDebug(${idx})">למה זה נבחר?</button>
      </div>
      <div class="debug-panel" id="debug-${idx}">
        <div class="debug-title">סיבת הבחירה</div>
        <div class="debug-reason">${reason}</div>
        ${debugFields}
      </div>`;
    document.getElementById('results-body').appendChild(card);
  });

  const showMoreBtn = document.getElementById('show-more-btn');
  if (hasMore) {
    showMoreBtn.classList.add('show');
  } else {
    showMoreBtn.classList.remove('show');
  }
}

const steps = [
  { id:'location', label:'שאלה 1 מתוך 11', q:'איפה את.ה מחפש.ת?', hint:'אזור, עיר, או שכונה בתל אביב', placeholder:'למשל: פלורנטין, תל אביב, הגליל התחתון...', chips:['תל אביב','פלורנטין','נווה צדק','יפו','הצפון הישן','ירושלים','חיפה','הגליל','הנגב'], optional:false },
  { id:'time_of_day', label:'שאלה 2 מתוך 11', q:'מתי ביום?', hint:'', placeholder:'למשל: ערב מאוחר אחרי 22:00...', chips:['בוקר / בראנץ\'','צהריים','ערב','לייט נייט / מאנץ\''], optional:false },
  { id:'occasion', label:'שאלה 3 מתוך 11', q:'מה האירוע?', hint:'', placeholder:'למשל: יומולדת 30 של אחי...', chips:['ארוחה רגילה','יומולדת','דייט','ארוחת עסקים','חגיגה משפחתית','ארוחה שקטה לבד'], optional:false },
  { id:'group', label:'שאלה 4 מתוך 11', q:'עם מי את.ה?', hint:'', placeholder:'למשל: 8 אנשים כולל 2 ילדים...', chips:['לבד','עם בת/ן זוג','2–3 חברים','4–6 אנשים','6+ משפחה'], optional:false },
  { id:'style_yes', label:'שאלה 5 מתוך 11', q:'סגנון מועדף?', hint:'אפשר לבחור כמה', placeholder:'למשל: ים תיכוני, יפני...', chips:['ים תיכוני','יפני','איטלקי','ישראלי מודרני','מקסיקני','בשרייה','פיצה','מזרח תיכוני','אסייתי'], optional:true, multi:true },
  { id:'style_no', label:'שאלה 6 מתוך 11', q:'סגנון להימנע ממנו?', hint:'אופציונלי', placeholder:'למשל: לא בשר, לא יפני...', chips:['בשר','דגים','מטוגן','חריף','אסייתי'], optional:true, multi:true },
  { id:'price', label:'שאלה 7 מתוך 11', q:'מה התקציב לאדם?', hint:'', placeholder:'', chips:['כמה שיותר זול','עד 50 ₪','50–100 ₪','100–200 ₪','יקר אבל לא מוגזם','אין הגבלה'], optional:false },
  { id:'kosher', label:'שאלה 8 מתוך 11', q:'חשוב שיהיה כשר?', hint:'', placeholder:'', chips:['כן, חייב כשר','עדיף כשר','לא משנה'], optional:false },
  { id:'diet', label:'שאלה 9 מתוך 11', q:'יש צמחונים / טבעונים בקבוצה?', hint:'', placeholder:'', chips:['לא','יש צמחונים — צריך אופציות','יש טבעונים — חייב מספיק אפשרויות','הכל צמחוני / טבעוני'], optional:false },
  { id:'vibe', label:'שאלה 10 מתוך 11', q:'איזו אווירה?', hint:'אפשר לבחור כמה', placeholder:'למשל: שקט ורגוע, רוצה מוזיקה...', chips:['אינטימי ושקט','קליל וכיפי','מכובד ורשמי','רועש וחי','בחוץ / פטיו','בר-אוכל'], optional:false, multi:true },
  { id:'day', label:'שאלה 11 מתוך 11', q:'באיזה יום?', hint:'', placeholder:'', chips:['אמצע שבוע','שישי','שבת','לא משנה'], optional:false }
];

function renderStep() {
  const s = steps[cur];
  const pct = Math.round(((cur + 1) / steps.length) * 100);
  document.getElementById('progress').style.width = pct + '%';
  let d = `<div class="step-label">${s.label}</div>`;
  d += `<div class="step-q">${s.q}</div>`;
  if (s.hint) d += `<div class="step-hint">${s.hint}</div>`;
  const fval = ans[s.id + '_free'] || '';
  d += `<div class="step-free"><textarea class="inp" rows="2" placeholder="${s.placeholder || 'הקלד.י כאן בחופשיות...'}" onchange="ans['${s.id}_free']=this.value;updateNextBtn()">${fval}</textarea></div>`;
  if (s.chips && s.chips.length) {
    d += '<div class="chips">';
    s.chips.forEach(o => {
      const isMulti = s.multi || false;
      const isSel = ans[s.id] && (isMulti ? ans[s.id].includes(o) : ans[s.id] === o);
      d += `<div class="chip${isSel ? ' sel' : ''}" data-step="${cur}" data-val="${o.replace(/"/g,'&quot;')}" data-multi="${isMulti}" onclick="chipClick(this)">${o}</div>`;
    });
    d += '</div>';
  }
  const isLast = cur === steps.length - 1;
  const ok = isAnswered(s);
  d += '<div class="btn-row">';
  if (cur > 0) d += '<button class="btn-back" onclick="goBack()">← חזרה</button>';
  else d += '<div></div>';
  d += `<button class="btn-next" id="btn-next" onclick="${isLast ? 'finishWizard()' : 'goNext()'}" ${ok ? '' : 'disabled'}>${isLast ? 'מצא.י לי! ✓' : 'המשך →'}</button>`;
  d += '</div>';
  if (!s.optional && !ok) d += '<button class="skip-btn" onclick="skipStep()">דלג.י על שאלה זו</button>';
  document.getElementById('wizard-body').innerHTML = d;
}

function chipClick(el) {
  const stepIdx = parseInt(el.dataset.step);
  const val = el.dataset.val;
  const isMulti = el.dataset.multi === 'true';
  const s = steps[stepIdx];
  if (isMulti) {
    if (!ans[s.id]) ans[s.id] = [];
    const i = ans[s.id].indexOf(val);
    if (i > -1) { ans[s.id].splice(i, 1); el.classList.remove('sel'); }
    else { ans[s.id].push(val); el.classList.add('sel'); }
  } else {
    ans[s.id] = val;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('sel'));
    el.classList.add('sel');
  }
  updateNextBtn();
}

function isAnswered(s) {
  const hasChip = ans[s.id] && (Array.isArray(ans[s.id]) ? ans[s.id].length > 0 : ans[s.id] !== '');
  const hasFree = (ans[s.id + '_free'] || '').trim() !== '';
  return s.optional || hasChip || hasFree;
}

function updateNextBtn() {
  const btn = document.getElementById('btn-next');
  if (btn) btn.disabled = !isAnswered(steps[cur]);
}

function goNext() { if (cur < steps.length - 1) { cur++; renderStep(); } }
function goBack() { if (cur > 0) { cur--; renderStep(); } }
function skipStep() { ans[steps[cur].id] = ''; ans[steps[cur].id + '_free'] = ''; goNext(); }

async function finishWizard() {
  const parts = [];
  steps.forEach(s => {
    const chip = ans[s.id];
    const free = ans[s.id + '_free'];
    if (chip && (Array.isArray(chip) ? chip.length > 0 : chip)) {
      parts.push(`${s.q} ${Array.isArray(chip) ? chip.join(', ') : chip}`);
    }
    if (free && free.trim()) parts.push(free.trim());
  });
  currentQuery = parts.join(' | ');
  currentOffset = 0;
  renderedCards = [];
  showView('view-results');
  await doSearch();
}

loadRestaurants();
</script>
